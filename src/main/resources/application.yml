server:
  port: 8080

spring:
  application:
    name: TaskManager

  datasource:
#    url: jdbc:postgresql://localhost:5432/taskmanager_db
    url: jdbc:postgresql://postgres:5432/taskmanager_db
    username: soturno
    password: soturno123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false #exibe SQL no console
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: task-manager

otel:
  exporter:
    otlp:
      endpoint: http://jaeger:4318